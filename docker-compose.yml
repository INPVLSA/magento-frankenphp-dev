services:
  frankenphp84:
    container_name: frankenphp84
    hostname: frankenphp84
    working_dir: /app
    image: local/frankenphp:8.4
    build:
      context: ./dev/franken/docker/Dockerfiles
      dockerfile: frankenPhp.Dockerfile
    volumes:
      - ./:/app:delegated
      - composer-cache:/home/magento/.composer
      # PHP config
      - ./dev/franken/docker/docker-files/php/conf.d/magento.ini:/usr/local/etc/php/conf.d/zz-magento.ini:ro
      - ./dev/franken/docker/docker-files/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/zz-opcache.ini:ro
      - ./dev/franken/docker/docker-files/php/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug.ini:ro
      # Caddy config (swap to Caddyfile.classic for non-worker mode)
      - ./dev/franken/docker/docker-files/caddy/Caddyfile.worker:/etc/caddy/Caddyfile:ro
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - XDEBUG_MODE=off
      - XDEBUG_CONFIG
      - PHP_IDE_CONFIG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - franken-magento

volumes:
  composer-cache:

networks:
  default:
  # Shared network with your DB / Redis / OpenSearch stack.
  # Create it once on the host:  docker network create franken-magento
  franken-magento:
    external: true
